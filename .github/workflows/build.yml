name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install tkinterdnd2 pyinstaller

      - name: Build Windows executable
        run: |
          pyinstaller --onefile --windowed --name "3MF_Gcode_Extractor" 3mf_extractor.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v3
        with:
          name: windows-executable
          path: dist/3MF_Gcode_Extractor.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install tkinterdnd2 pyinstaller

      - name: Build macOS app
        run: |
          pyinstaller --onedir --windowed --name "3MF_Gcode_Extractor" 3mf_extractor.py

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg --volname "3MF Gcode Extractor" --window-pos 200 120 --window-size 600 400 --icon-size 100 --app-drop-link 425 120 "3MF_Gcode_Extractor.dmg" "dist/3MF_Gcode_Extractor.app" || true

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v3
        with:
          name: macos-app
          path: 3MF_Gcode_Extractor.dmg

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v3
        with:
          name: windows-executable

      - name: Download macOS artifact
        uses: actions/download-artifact@v3
        with:
          name: macos-app

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            3MF_Gcode_Extractor.exe
            3MF_Gcode_Extractor.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


